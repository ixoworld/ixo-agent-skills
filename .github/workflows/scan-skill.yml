name: Scan Skill (SkillSpector)

# Security-scans skills changed in a PR using NVIDIA SkillSpector
# (https://github.com/NVIDIA/SkillSpector). Detects prompt injection, data
# exfiltration, malicious code, supply-chain and other agent-skill risks.
#
# The scan is a HARD GATE: SkillSpector exits non-zero when a skill's risk
# score exceeds its threshold (> 50), which fails this check and blocks merge.
#
# Notes on fork PRs: PRs opened from forks do NOT receive repo secrets and get
# a read-only token. In that case the scan automatically falls back to
# static-only analysis (--no-llm) and the PR-comment step is best-effort; the
# full report is always written to the workflow job summary, and the security
# gate still applies because it relies only on the scanner's exit code.

on:
  pull_request:
    paths:
      - 'skills/**'

permissions:
  contents: read
  pull-requests: write

# Pin SkillSpector to a specific commit for reproducibility / supply-chain
# safety (the project publishes no tags or PyPI package). Bump deliberately.
env:
  SKILLSPECTOR_REF: 2eb844780ab163f01468ecf142c40a2ec0fcaec0

jobs:
  scan:
    name: Security scan changed skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so the PR base commit is available for the diff.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SkillSpector
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/NVIDIA/SkillSpector.git@${SKILLSPECTOR_REF}"

      - name: Get changed skills
        id: changed-skills
        run: |
          # Get list of changed skill directories (same pattern as validate-skill.yml)
          CHANGED_SKILLS=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^skills/' | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          echo "skills=$CHANGED_SKILLS" >> "$GITHUB_OUTPUT"
          echo "Changed skills: $CHANGED_SKILLS"

      - name: Run SkillSpector
        id: scan
        continue-on-error: true
        env:
          SKILLSPECTOR_PROVIDER: nv_build
          NVIDIA_INFERENCE_KEY: ${{ secrets.NVIDIA_INFERENCE_KEY }}
        run: |
          # Do NOT use `set -e`: a non-zero scan must not abort the loop.
          set -uo pipefail

          FAILED=0
          : > report.md

          # Fall back to static-only analysis when no LLM key is available
          # (e.g. PRs from forks, where secrets are not provided).
          LLM_FLAG=""
          if [ -z "${NVIDIA_INFERENCE_KEY:-}" ]; then
            LLM_FLAG="--no-llm"
            echo "> :warning: No \`NVIDIA_INFERENCE_KEY\` available — running static-only analysis (\`--no-llm\`). LLM semantic analysis is skipped." >> report.md
            echo "" >> report.md
          fi

          if [ -z "${{ steps.changed-skills.outputs.skills }}" ]; then
            echo "_No changed skill directories detected._" >> report.md
          fi

          for SKILL_NAME in ${{ steps.changed-skills.outputs.skills }}; do
            SKILL_DIR="skills/$SKILL_NAME"

            # Skip if directory doesn't exist (was deleted in this PR)
            if [ ! -d "$SKILL_DIR" ]; then
              echo "Skipping $SKILL_NAME (deleted)"
              continue
            fi

            echo "::group::Scanning $SKILL_NAME"
            skillspector scan "$SKILL_DIR" $LLM_FLAG --format markdown --output "skillspector-$SKILL_NAME.md"
            CODE=$?
            echo "::endgroup::"

            {
              echo "## \`$SKILL_NAME\`"
              echo ""
              cat "skillspector-$SKILL_NAME.md"
              echo ""
            } >> report.md

            if [ "$CODE" -gt 0 ]; then
              echo "::error::SkillSpector flagged '$SKILL_NAME' (exit code $CODE — risk score over threshold)."
              FAILED=1
            fi
          done

          # Always surface the full report in the Actions job summary.
          {
            echo "# :shield: SkillSpector security scan"
            echo ""
            cat report.md
          } >> "$GITHUB_STEP_SUMMARY"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Comment scan results on PR
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- skillspector-report -->';
            let report = '';
            try {
              report = fs.readFileSync('report.md', 'utf8');
            } catch (e) {
              report = '_No report was produced._';
            }
            const status = '${{ steps.scan.outputs.failed }}' === '1'
              ? ':x: **One or more skills exceeded the risk threshold — this check is failing and blocks merge.**'
              : ':white_check_mark: **No skills exceeded the risk threshold.**';
            const body = [
              marker,
              '## :shield: SkillSpector security scan',
              '',
              status,
              '',
              report,
              '',
              '<sub>Automated scan by [NVIDIA SkillSpector](https://github.com/NVIDIA/SkillSpector). This is a first-pass check, not a substitute for human review.</sub>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce security gate
        if: steps.scan.outputs.failed == '1'
        run: |
          echo "::error::SkillSpector flagged one or more skills (risk score over threshold). See the PR comment / job summary for details."
          exit 1
